{{ define "auth"}}
{{template "header"}}
<main role="main" class="inner cover">
    <h1 class="cover-heading">Авторизация</h1>
    <form action="/valid" method="POST">
        <input type="text" name="username" id="username" placeholder="Введите имя пользователя" class="form-control">
        <br>
        <input type="text" name="password" id="password" placeholder="Введите пароль" class="form-control">
        <br>
        <button class="btn btn-warning">Войти</button>
    </form>
</main>
{{template "footer"}}
{{end}}
